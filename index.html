<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>EP3 · 추리 정리</title>
<style>
  :root{--bg:#0c0e13;--panel:#151823;--line:#2a3040;--ink:#e9ecf2;--muted:#8b93a6;
    --ewon:#b88cff;--logic:#5fb4ff;--gold:#ffd54a;}
  *{box-sizing:border-box}
  body{margin:0;background:radial-gradient(130% 90% at 50% 0%,#171b27 0%,var(--bg) 60%);color:var(--ink);
    font-family:"Malgun Gothic","Apple SD Gothic Neo",system-ui,sans-serif;line-height:1.9;}
  .wrap{max-width:760px;margin:0 auto;padding:18px 16px 60px}
  header{text-align:center;padding:8px 0 14px}
  header h1{margin:0;font-size:17px;letter-spacing:3px;color:#dfe3ea}
  header p{margin:6px 0 0;font-size:12.5px;color:var(--muted)}
  .sec{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:16px 18px 6px;margin:16px 0}
  .sec.ewon{border-top:3px solid var(--ewon)}
  .sec.logic{border-top:3px solid var(--logic)}
  .sechead{font-size:15px;font-weight:800;letter-spacing:1px;margin:2px 0 12px;display:flex;align-items:center;gap:8px}
  .sec.ewon .sechead{color:var(--ewon)}
  .sec.logic .sechead{color:var(--logic)}
  .qblock{margin:0 0 16px;padding:0 0 12px;border-bottom:1px dashed #2a3040}
  .qblock:last-child{border-bottom:none}
  .qhead{font-size:13px;font-weight:800;color:#cfd6e4;margin:0 0 8px;letter-spacing:.5px}
  .qline{font-size:14.5px;color:#dde2ec;margin:7px 0}
  input.blk{background:#0e1118;border:none;border-bottom:2px solid #46506a;color:#fff;font-family:inherit;
    font-size:14px;padding:2px 7px;margin:1px 2px;border-radius:6px 6px 0 0;min-width:54px;transition:border-color .15s}
  .sec.ewon input.blk:focus{outline:none;border-color:var(--ewon);background:#1a1426}
  .sec.logic input.blk:focus{outline:none;border-color:var(--logic);background:#101826}
  input.blk::placeholder{color:#566}
  .bar{position:sticky;bottom:0;display:flex;gap:8px;justify-content:center;padding:12px;margin-top:8px;
    background:linear-gradient(0deg,var(--bg) 60%,transparent)}
  .bar button{font-family:inherit;font-size:13px;font-weight:700;padding:10px 16px;border-radius:10px;cursor:pointer}
  .bar .copy{background:linear-gradient(180deg,#243047,#1a2235);border:1px solid var(--gold);color:var(--gold)}
  .bar .copy:hover{background:#2a3550;color:#fff}
  .bar .reset{background:#1b2030;border:1px solid var(--line);color:var(--muted)}
  .bar .reset:hover{border-color:#ff8585;color:#ff8585}
  .saved{text-align:center;font-size:11.5px;color:#6fc98a;height:16px;margin-top:-4px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>EP3 · 추리 정리</h1>
    <p>달의 비극 — 빈칸을 둘이 함께 채워 넣으세요. (입력은 자동 저장됩니다)</p>
  </header>
  <div id="content"></div>
  <div class="saved" id="saved"></div>
  <div class="bar">
    <button class="copy" id="copyBtn">📋 답안 전체 복사</button>
    <button class="reset" id="resetBtn">🗑 초기화</button>
  </div>
</div>
<script>
const DATA=[
 {key:"ewon", icon:"🔮", title:"이능 파트", mys:[
   {q:"수수께끼 1 · 이능의 정체", lines:[
     "증언으로 보아, {B} 이 아닐까 추측된다."
   ]},
   {q:"수수께끼 2 · 극장 뒤 오두막에서의 탈출 방법", lines:[
     "토키토 센리는 {B}로 {B}을 하여 탈출했다."
   ]},
   {q:"수수께끼 3 · 살해 시간과 달 속에서 나타난 이유", lines:[
     "범행 시간은 {B}이며, {B}로 찔러 살해했다. 피는 {B}에 고였기 때문에 새어 나오지 않았다.",
     "생존해 있는 모습을 보이기 위해 {B}로 {B}을 하여, 공연 개시 시에 {B}에 갔다.",
     "거기서 범인은 {B}를 {B}이라고 생각했기 때문에, 살해 후 미나토에게 {B}라고 부추겼다."
   ]},
   {q:"수수께끼 4 · 살해 동기", lines:[
     "{B}는 {B}의 {B}였다. {B}에게 {B}을 받은 것이 원인으로 {B}을 할 수 있게 되었으나,",
     "이능을 쓰면 쓸수록 {B}이 서툴러졌다. 그리고 {B} 때문에 살해하고 말았다."
   ]}
 ]},
 {key:"logic", icon:"🧩", title:"논리 파트", mys:[
   {q:"수수께끼 1 · 오두막에서 빠져나온 트릭", lines:[
     "이쵸우 렌지는 {B}한 인간이며, {B}은 불충분했다."
   ]},
   {q:"수수께끼 2 · 달 안에서 피해자가 나타난 수수께끼", lines:[
     "피해자는 공연 개시 후, 달이 매달려 있는 상태일 때 {B}에서 목격되었다.",
     "그 후에도 달은 공중에 있었음에도 불구하고, 피해자는 달 안에서 시체가 되어 나타났다.",
     "피해자가 달 안에 들어간 타이밍은 연출을 위해 몇 분 동안 {B}을 하고 있었을 때다.",
     "그 타이밍에 {B}의 {B}으로 달을 조작하여, {B}를 끊고 달을 열어 달 안에 「카키자키 리코」는 들어갔다.",
     "그러나 한 가지 문제가 있다. 들어갈 수는 있어도 {B}.",
     "하지만 전환 중에 스태프는 무대 뒤편의 {B}은 아무도 {B}하지 않았다.",
     "즉, 스태프 이외의 누군가가 캣워크(Catwalk)에 있는 {B}을 {B}해야 한다."
   ]},
   {q:"수수께끼 3 · 살해 방법", lines:[
     "범행 시 흉기를 들키면 도망칠 가능성이 있다. 하지만 {B}은 예리한 데다 매우 가늘어 {B} 사이를 통과시킬 수 있다.",
     "흉기를 보여주지 않고도 살해는 가능하다. 그리고 손잡이 부분을 (얇은 칼날이기 때문에) {B} 숨길 수 있었다.",
     "그 소리를 들은 스태프도 있었다. 범인은 사건 발각 후의 혼란을 틈타 손잡이를 {B}에 둔 것이다.",
     "다만, 이 공연은 {B}이기 때문에 관계자 이외에는 내용은 물론 달의 구조를 알지 못한다.",
     "하지만 이 공연의 관계자라면 이 트릭을 생각해 내도 이상하지 않다."
   ]}
 ]}
];
const KEY="ep3fill_";
const content=document.getElementById('content'), savedEl=document.getElementById('saved');
let idx=0;
function sizeInput(el){ el.size=Math.max(5, [...el.value].length+1); }
function makeInput(){
  const i=document.createElement('input'); i.className='blk'; i.type='text'; i.placeholder='＿＿';
  const id=KEY+(idx++); i.dataset.id=id;
  const saved=localStorage.getItem(id); if(saved!=null) i.value=saved;
  sizeInput(i);
  i.addEventListener('input',()=>{ localStorage.setItem(id,i.value); sizeInput(i); flash(); });
  return i;
}
function buildLine(tpl){
  const div=document.createElement('div'); div.className='qline';
  const parts=tpl.split('{B}');
  parts.forEach((p,k)=>{ if(p) div.appendChild(document.createTextNode(p)); if(k<parts.length-1) div.appendChild(makeInput()); });
  return div;
}
DATA.forEach(sec=>{
  const s=document.createElement('div'); s.className='sec '+sec.key; s.dataset.title=sec.title;
  const h=document.createElement('div'); h.className='sechead'; h.textContent=sec.icon+' '+sec.title; s.appendChild(h);
  sec.mys.forEach(m=>{
    const qb=document.createElement('div'); qb.className='qblock'; qb.dataset.q=m.q;
    const qh=document.createElement('div'); qh.className='qhead'; qh.textContent=m.q; qb.appendChild(qh);
    m.lines.forEach(l=>qb.appendChild(buildLine(l)));
    s.appendChild(qb);
  });
  content.appendChild(s);
});
let flashT=null;
function flash(){ savedEl.textContent='✓ 저장됨'; clearTimeout(flashT); flashT=setTimeout(()=>savedEl.textContent='',1200); }
document.getElementById('copyBtn').addEventListener('click',()=>{
  const out=[];
  document.querySelectorAll('#content > .sec').forEach(sec=>{
    out.push('【 '+sec.dataset.title+' 】');
    sec.querySelectorAll('.qblock').forEach(qb=>{
      out.push('▸ '+qb.dataset.q);
      qb.querySelectorAll('.qline').forEach(ln=>{
        let str='';
        ln.childNodes.forEach(n=>{ if(n.nodeType===3) str+=n.textContent; else if(n.tagName==='INPUT') str+=(n.value.trim()||'____'); });
        out.push('   '+str);
      });
      out.push('');
    });
  });
  const text=out.join('\n');
  navigator.clipboard.writeText(text).then(()=>{ savedEl.textContent='📋 전체 답안이 복사되었습니다'; clearTimeout(flashT); flashT=setTimeout(()=>savedEl.textContent='',1800); });
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  if(!confirm('입력한 답을 모두 지울까요?')) return;
  document.querySelectorAll('input.blk').forEach(i=>{ localStorage.removeItem(i.dataset.id); i.value=''; sizeInput(i); });
  savedEl.textContent='초기화됨';
});
</script>
</body>
</html>
